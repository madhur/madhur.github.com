{% for post in posts %}
{% capture this_year %}{{ post.date | date: "%Y" }}{% endcapture %}

{% if year != this_year %}
{% assign year = this_year %}
<h2 class="archive-year">{{ year }}</h2>
{% endif %}

<div class="archive-item">
	<span class="archive-date">{{ post.date | date: "%b %d" }}</span>
	<a href="{{ post.url }}">{{ post.title }}</a>
</div>
{% endfor %}
